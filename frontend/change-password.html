<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Смена пароля</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="app-nav" data-active=""></div>

  <main class="mx-auto flex min-h-[70vh] max-w-md items-center px-4 py-8" x-data="changePasswordPage" x-init="init()">
    <section class="w-full rounded-2xl bg-white p-6 shadow-sm">
      <h2 class="text-2xl font-semibold text-slate-900">Смена пароля</h2>
      <p class="mt-2 text-sm text-slate-500">При первом входе необходимо задать собственный пароль.</p>

      <form class="mt-6 space-y-4" @submit.prevent="submit()">
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700" for="currentPassword">Текущий пароль</label>
          <input
            id="currentPassword"
            x-model="currentPassword"
            type="password"
            required
            class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700" for="newPassword">Новый пароль</label>
          <input
            id="newPassword"
            x-model="newPassword"
            type="password"
            required
            minlength="4"
            class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700" for="confirmPassword">Подтверждение пароля</label>
          <input
            id="confirmPassword"
            x-model="confirmPassword"
            type="password"
            required
            minlength="4"
            class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
        </div>

        <button
          type="submit"
          :disabled="loading"
          class="w-full rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-60">
          <span x-text="loading ? 'Сохранение...' : 'Сменить пароль'"></span>
        </button>
      </form>

      <p x-show="error" x-text="error" class="mt-4 text-sm text-red-600"></p>
    </section>
  </main>

  <script src="static/app.js?v=5"></script>
  <script src="static/change-password.js?v=1"></script>
</body>
</html>
