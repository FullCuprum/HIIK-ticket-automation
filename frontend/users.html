<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пользователи</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="app-nav" data-active="users"></div>

  <main class="mx-auto max-w-6xl px-4 py-8" x-data="usersPage" x-init="init()">
    <section class="rounded-2xl bg-white p-6 shadow-sm">
      <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <h2 class="text-2xl font-semibold text-slate-900">Пользователи системы</h2>
          <p class="mt-1 text-sm text-slate-500">Учётные записи и роли доступа</p>
        </div>
        <div class="flex flex-wrap gap-3">
          <button @click="loadUsers()" :disabled="loading" class="rounded-xl border border-slate-300 px-4 py-2.5 text-sm hover:bg-slate-50 disabled:opacity-60">Обновить</button>
          <button @click="openCreateForm()" class="rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-medium text-white hover:bg-blue-700">Добавить пользователя</button>
        </div>
      </div>

      <p x-show="error" x-text="error" class="mt-4 text-sm text-red-600"></p>

      <div class="mt-6 overflow-x-auto">
        <table class="min-w-full text-left text-sm">
          <thead class="border-b border-slate-200 text-slate-500">
            <tr>
              <th class="px-3 py-3">Логин</th>
              <th class="px-3 py-3">Роль</th>
              <th class="px-3 py-3">Статус</th>
              <th class="px-3 py-3">Смена пароля</th>
              <th class="px-3 py-3">Создан</th>
              <th class="px-3 py-3">Действия</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="user in items" :key="user.id">
              <tr class="border-b border-slate-100 hover:bg-slate-50">
                <td class="px-3 py-3 font-medium" x-text="user.username"></td>
                <td class="px-3 py-3" x-text="roleLabel(user.role)"></td>
                <td class="px-3 py-3">
                  <span class="rounded-full px-2.5 py-1 text-xs font-medium"
                        :class="user.is_active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-600'"
                        x-text="user.is_active ? 'Активен' : 'Неактивен'"></span>
                </td>
                <td class="px-3 py-3">
                  <span class="rounded-full px-2.5 py-1 text-xs font-medium"
                        :class="user.must_change_password ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'"
                        x-text="user.must_change_password ? 'При первом входе' : 'Не требуется'"></span>
                </td>
                <td class="px-3 py-3 whitespace-nowrap" x-text="formatDateTime(user.created_at)"></td>
                <td class="px-3 py-3">
                  <div class="flex flex-wrap gap-2">
                    <button @click="openEditForm(user)" class="rounded-lg border border-slate-300 px-3 py-1.5 text-xs hover:bg-slate-50">Редактировать</button>
                    <button @click="deleteUser(user)" class="rounded-lg border border-red-200 px-3 py-1.5 text-xs text-red-600 hover:bg-red-50">Удалить</button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <p x-show="!loading && items.length === 0" class="mt-6 rounded-xl bg-slate-50 p-4 text-sm text-slate-500">
        Пользователи не найдены.
      </p>
    </section>

    <section x-show="showForm" x-transition class="fixed inset-0 z-40 flex items-center justify-center bg-slate-900/40 p-4">
      <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-xl">
        <div class="flex items-center justify-between">
          <h3 class="text-xl font-semibold" x-text="editingId ? 'Редактирование пользователя' : 'Новый пользователь'"></h3>
          <button @click="showForm = false" class="text-slate-500 hover:text-slate-700">✕</button>
        </div>

        <form class="mt-6 space-y-4" @submit.prevent="saveUser()">
          <div>
            <label class="mb-1 block text-sm font-medium">Логин</label>
            <input x-model="form.username" required class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm">
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium" x-text="editingId ? 'Новый пароль (оставьте пустым, чтобы не менять)' : 'Пароль'"></label>
            <input x-model="form.password" type="password" :required="!editingId" class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm">
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium">Роль</label>
            <select x-model="form.role" class="w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm">
              <option value="user">Пользователь</option>
              <option value="employee">Сотрудник</option>
              <option value="admin">Администратор</option>
            </select>
          </div>
          <div x-show="editingId" class="flex items-center gap-2">
            <input x-model="form.is_active" type="checkbox" id="user_is_active" class="h-4 w-4 rounded border-slate-300">
            <label for="user_is_active" class="text-sm">Активен</label>
          </div>
          <p x-show="!editingId" class="text-xs text-slate-500">При первом входе пользователю будет предложено сменить пароль.</p>

          <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" :disabled="saving" class="rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-60">
              <span x-text="saving ? 'Сохранение...' : 'Сохранить'"></span>
            </button>
            <button type="button" @click="showForm = false" class="rounded-xl border border-slate-300 px-5 py-2.5 text-sm hover:bg-slate-50">Отмена</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="static/app.js?v=8"></script>
  <script src="static/users.js?v=1"></script>
</body>
</html>
